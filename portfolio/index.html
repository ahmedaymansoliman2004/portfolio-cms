<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahmed Ayman Soliman – AI & Data Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&family=Cairo:wght@400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!--
      Anti-flash script: apply saved language direction BEFORE first paint.
      Without this, users who saved 'en' still see a flash of RTL layout.
    -->
    <script>
      (function() {
        var lang = localStorage.getItem('lang');
        if (lang === 'en') {
          document.documentElement.setAttribute('dir', 'ltr');
          document.documentElement.setAttribute('lang', 'en');
          document.documentElement.style.fontFamily = "'Syne', 'DM Sans', system-ui, sans-serif";
        }
        // For 'ar' (or no saved pref), the dir="rtl" lang="ar" defaults above are correct.
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
